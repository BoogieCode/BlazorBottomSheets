name: Publish to NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack src/BlazorBottomSheets/BlazorBottomSheets.csproj -c Release -o out

      - name: NuGet login (trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: BoogieWoogie

      - name: Push
        run: dotnet nuget push out/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
